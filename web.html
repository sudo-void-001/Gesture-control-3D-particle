<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three.js + MediaPipe Debug</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: monospace; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Debug Console Overlay */
        #debug-console {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; padding: 20px; box-sizing: border-box;
        }
        .log-entry { margin-bottom: 5px; }
        .error { color: #ff5555; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px; }
        .success { color: #55ff55; }
        .info { color: #aaa; }

        #video-preview {
            position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px;
            border: 2px solid #555; z-index: 10; transform: scaleX(-1);
            background: #222;
        }
    </style>
</head>
<body>

    <div id="debug-console"></div>
    <video id="video-preview" autoplay playsinline muted></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from "@mediapipe/tasks-vision";

        // --- Custom Logger for the User ---
        function log(msg, type = 'info') {
            const consoleDiv = document.getElementById('debug-console');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `> ${msg}`;
            consoleDiv.appendChild(entry);
            console.log(msg); // Also log to real console
        }
        
        window.onerror = function(message, source, lineno, colno, error) {
            log(`CRITICAL ERROR: ${message}`, 'error');
        };

        // --- Main Logic ---
        async function run() {
            log("Initializing Application...", 'info');

            // 1. Check Protocol
            if (window.location.protocol === 'file:') {
                log("⚠️ ERROR: You are running via file:// protocol.", 'error');
                log("Please run this via a local server (e.g., VS Code Live Server or python -m http.server)", 'error');
                return;
            }

            // 2. Setup Three.js
            let scene, camera, renderer, particles;
            try {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);
                
                // Add simple particles
                const geometry = new THREE.BufferGeometry();
                const count = 5000;
                const positions = new Float32Array(count * 3);
                for(let i=0; i<count*3; i++) positions[i] = (Math.random() - 0.5) * 10;
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({ size: 0.05, color: 0x00ffff });
                particles = new THREE.Points(geometry, material);
                scene.add(particles);
                
                log("Three.js Scene Created.", 'success');
            } catch (e) {
                log("Failed to create 3D scene: " + e.message, 'error');
            }

            // 3. Setup Camera
            const video = document.getElementById('video-preview');
            try {
                log("Requesting Camera Access...", 'info');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                log("Camera Access Granted.", 'success');
            } catch (e) {
                log("Camera Failed: " + e.message, 'error');
                log("Ensure browser has permission and you are on localhost/https.", 'error');
                return;
            }

            // 4. Load AI Model
            let handLandmarker;
            try {
                log("Downloading AI Model (approx 10MB)...", 'info');
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm"
                );
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                log("AI Model Loaded Successfully!", 'success');
            } catch (e) {
                log("AI Model Failed: " + e.message, 'error');
            }

            // 5. Animation Loop
            let lastVideoTime = -1;
            function animate() {
                requestAnimationFrame(animate);

                // AI Detection
                if (handLandmarker && video.currentTime !== lastVideoTime) {
                    lastVideoTime = video.currentTime;
                    const results = handLandmarker.detectForVideo(video, performance.now());
                    
                    if (results.landmarks && results.landmarks.length > 0) {
                        const hand = results.landmarks[0][0]; // Wrist
                        // Map hand x/y to particle position
                        const x = (hand.x - 0.5) * -10;
                        const y = (hand.y - 0.5) * -10;
                        particles.position.x += (x - particles.position.x) * 0.1;
                        particles.position.y += (y - particles.position.y) * 0.1;
                        particles.material.color.setHex(0x55ff55); // Green when hand detected
                    } else {
                        particles.material.color.setHex(0x00ffff); // Blue when no hand
                    }
                }

                renderer.render(scene, camera);
            }
            animate();
        }

        run();
    </script>
</body>
</html>
